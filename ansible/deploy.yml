---
# =====================================================================
# Configure each EC2 host (Amazon Linux 2) and deploy the containerized
# e-commerce stack:
#   1. Install Docker + Docker Compose plugin
#   2. Copy the app stack to the host
#   3. docker compose up  (Nginx -> Node.js/PM2 -> MongoDB)
#   4. Verify the storefront responds
# The hosts are in private subnets and are reached via the bastion
# (ProxyJump is configured in the inventory generated by the pipeline).
# =====================================================================
- name: Deploy e-commerce stack
  hosts: web
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/ecommerce

  tasks:
    - name: Wait for SSH to be reachable (through the bastion)
      ansible.builtin.wait_for_connection:
        timeout: 120

    - name: Install Docker
      ansible.builtin.yum:
        name: docker
        state: present

    - name: Ensure Docker is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to the docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: true

    - name: Install Docker Compose plugin (v2)
      ansible.builtin.shell: |
        set -e
        mkdir -p /usr/local/lib/docker/cli-plugins
        curl -SL "https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64" \
          -o /usr/local/lib/docker/cli-plugins/docker-compose
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      args:
        creates: /usr/local/lib/docker/cli-plugins/docker-compose

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy application stack to the host
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ app_dir }}/"
      loop:
        - ../app
        - ../nginx
        - ../docker-compose.yml

    - name: Build and start the stack with Docker Compose
      ansible.builtin.command:
        cmd: docker compose up -d --build
        chdir: "{{ app_dir }}"
      register: compose_up
      changed_when: true

    - name: Wait for the storefront to respond on port 80
      ansible.builtin.uri:
        url: http://localhost:80/
        status_code: 200
      register: site_check
      retries: 12
      delay: 10
      until: site_check.status == 200
