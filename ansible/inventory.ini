# Sample inventory (AWS edition) for reference only.
# In CI, the GitHub Actions pipeline GENERATES inventory.generated.ini from
# the Terraform outputs: the app instances' PRIVATE IPs, reached through the
# bastion host via SSH ProxyJump. You normally don't edit this file.
#
# Amazon Linux 2 default SSH user is "ec2-user"; the key pair is "vockey".
[web]
10.0.1.10 ansible_user=ec2-user
10.0.2.10 ansible_user=ec2-user

[web:vars]
ansible_ssh_private_key_file=key.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand="ssh -W %h:%p -i key.pem -o StrictHostKeyChecking=no ec2-user@BASTION_PUBLIC_IP"'
