[defaults]
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
# Pretty YAML-formatted task output (works with the built-in default callback).
result_format = yaml

[ssh_connection]
# Speeds up and stabilises SSH for fresh servers
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
