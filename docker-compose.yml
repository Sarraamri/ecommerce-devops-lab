# Full app stack: Nginx (reverse proxy) -> Node.js app (PM2) -> MongoDB
# Deployed onto each EC2 instance by Ansible.
services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: ./app
    environment:
      - PORT=3000
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=ecommerce
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
